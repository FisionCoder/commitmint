name: Release (Windows)

# Publishes a Windows build as a GitHub Release.
# Trigger by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# or run it manually from the Actions tab (workflow_dispatch).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write # needed to create the Release and upload assets

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true

      - name: Resolve version/tag
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package release zip
        shell: pwsh
        run: |
          $tag = "${{ steps.ver.outputs.tag }}"
          $src = "build/windows/x64/runner/Release"
          $zip = "CommitMint-$tag-windows-x64.zip"
          Compress-Archive -Path "$src/*" -DestinationPath $zip -CompressionLevel Optimal
          "ASSET=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Commit Mint ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: ${{ env.ASSET }}
